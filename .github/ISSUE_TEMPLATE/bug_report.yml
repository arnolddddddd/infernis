name: Bug Report
description: Report a bug in INFERNIS
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Call endpoint `GET /v1/risk/49.28/-123.12`
        2. Observe response...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API endpoints
        - Data pipelines
        - FWI computation
        - Model / predictions
        - Grid system
        - Database / migrations
        - Deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, coordinates, environment info, etc.
